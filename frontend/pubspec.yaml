name: aqua_sense
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  
  # Data & Networking
  http: ^1.2.1
  shared_preferences: ^2.2.3
  provider: ^6.1.2
  
  # Files & Storage
  path_provider: ^2.1.2
  open_filex: ^4.3.4  # Added for opening the downloaded PDF reports
  
  # UI & Charts
  fl_chart: ^1.1.1
  cupertino_icons: ^1.0.8
  screen_brightness: ^0.2.2+1
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/icons/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app.png"
  min_sdk_android: 21
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icons/app.png"