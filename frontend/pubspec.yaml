name: aqua_sense
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  fl_chart: ^1.1.1 
  http: ^1.2.1 

  cupertino_icons: ^1.0.8
  image_picker: ^1.1.2
  provider: ^6.1.2
  screen_brightness: ^2.1.7
  shared_preferences: ^2.2.3
  open_filex: ^4.3.4
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_secure_storage: ^10.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app.png"
  min_sdk_android: 21
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icons/app.png"