name: Flutter Web Build Check

on:
  pull_request:
    branches: [ dev, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install dependencies
        working-directory: frontend
        run: flutter pub get
      - name: Build web
        working-directory: frontend
        run: flutter build web --no-wasm-dry-run
